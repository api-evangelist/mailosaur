aid: mailosaur
name: Mailosaur
description: >-
  Mailosaur is an email and SMS testing platform for developers and QA teams.
  It provides a REST API for creating test inboxes, capturing and retrieving
  messages, running assertions, performing deliverability analysis, and
  integrating email and SMS testing into CI/CD pipelines. The platform supports
  authentication testing (TOTP/2FA), spam analysis, SPF/DKIM/DMARC validation,
  and connects via SMTP, POP3, and IMAP protocols.
